name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: just lint

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: Install matrix Python and run tests
        run: |
          mise use python@${{ matrix.python }}
          rm -rf .venv
          mise install
          just install
          just test

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: just install
      - run: just build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
