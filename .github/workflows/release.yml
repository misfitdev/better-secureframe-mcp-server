name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
      - run: just install
      - run: just build
      - name: Generate SLSA subject hashes
        id: hash
        working-directory: dist
        run: echo "hashes=$(sha256sum * | base64 -w0)" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/

  # PyPI publishing is disabled for now. To enable: uncomment this job and set up
  # PyPI Trusted Publishing (OIDC) at
  # https://pypi.org/manage/project/better-secureframe-mcp-server/settings/publishing/
  # pypi:
  #   needs: build
  #   runs-on: ubuntu-latest
  #   environment: pypi
  #   permissions:
  #     id-token: write
  #   steps:
  #     - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
  #       with:
  #         name: dist
  #         path: dist/
  #     - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

  github-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: dist/*
          generate_release_notes: true

  # SLSA3 build provenance for the released artifacts: a signed, non-falsifiable
  # attestation of how/where they were built. Runs after github-release (the
  # generator uploads to an existing release; it does not create one) and
  # attaches provenance.intoto.jsonl to the v* release. Verify downloaded
  # artifacts with `slsa-verifier verify-artifact`.
  provenance:
    needs: [build, github-release]
    permissions:
      actions: read # detect the GitHub Actions environment
      id-token: write # sign provenance via OIDC (Sigstore)
      contents: write # upload provenance to the release
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.build.outputs.hashes }}"
      upload-assets: true
