name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
      - run: just install
      - run: just build
      - name: Generate SLSA subject hashes
        id: hash
        working-directory: dist
        run: echo "hashes=$(sha256sum -- * | base64 -w0)" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/

  # PyPI publishing is disabled for now. To enable: uncomment this job and set up
  # PyPI Trusted Publishing (OIDC) at
  # https://pypi.org/manage/project/better-secureframe-mcp-server/settings/publishing/
  # pypi:
  #   needs: build
  #   runs-on: ubuntu-latest
  #   environment: pypi
  #   permissions:
  #     id-token: write
  #   steps:
  #     - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
  #       with:
  #         name: dist
  #         path: dist/
  #     - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

  github-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: dist/*
          generate_release_notes: true

  # SLSA Build L3 provenance: a signed, non-falsifiable attestation generated in
  # an isolated reusable workflow that the build job cannot tamper with (this is
  # the isolation that distinguishes L3 from same-job L2). The generator MUST be
  # pinned to a semver tag, not a commit SHA, so slsa-verifier can verify the
  # builder identity. Runs after github-release and uploads
  # provenance.intoto.jsonl to the existing v* release. Verify a downloaded
  # artifact with `slsa-verifier verify-artifact`.
  provenance:
    needs: [build, github-release]
    permissions:
      actions: read # detect the GitHub Actions environment
      id-token: write # sign provenance via OIDC (Sigstore)
      contents: write # upload provenance to the release
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.build.outputs.hashes }}"
      upload-assets: true
