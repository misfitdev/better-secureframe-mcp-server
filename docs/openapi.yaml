- name: Trust Center Request
  description: |-
    This document describes the API for reading and updating Trust Center Requests.\
    Note: In order to access this API, you need to have paid features enabled for Trust.
- name: User
  description: This document describes the API for reading and updating Users.
- name: User Account
  description: This document describes the API for reading and linking User Accounts.
- name: User Evidence
  description: This document describes the API for creating Evidence for a User.
- name: User Security Settings
  description: This document describes the API for retrieving user security settings
    for the provided API key's company.
- name: Vendor
  description: This document describes the API for reading and archiving Vendors.
components:
  schemas:
    Models_CustomConnections_CreateResourceDataRequest:
      type: object
      properties:
        schema_slug:
          type: string
          description: |-
            The slug identifying the data type this data conforms to. This is used to
            identify the schema to use for processing the data.
          example: users
        vendor_slug:
          type: string
          description: |-
            The slug identifying the vendor this data should be attributed to. This
            must match the vendor configured for the connection.
          example: acme
        resource_data:
          type: array
          items:
            type: object
          description: |-
            An array of objects representing the current state of a set of
            resources provided by this data source.
          example:
          - id: '123'
            name: John Doe
            email: john.doe@example.com
          - id: '456'
            name: Jane Doe
            email: jane.doe@example.com
        partial:
          type: boolean
          description: |-
            If true, the data will be processed as a partial update. If set, only
            the fields that are present in the data will be updated, and any fields that
            are not present will be left unchanged. The primary ID of the resource
            must always be present in the data.
      required:
      - schema_slug
      - vendor_slug
      - resource_data
    CloudResource:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: The identifier for this CloudResource.
        cloud_resource_type:
          type: string
          description: The type of this CloudResource.
        created_at:
          type: string
          format: date-time
          description: The date this CloudResource was created.
        in_audit_scope:
          type: boolean
          description: Flag to indicate if this CloudResource is in scope.
        out_of_audit_scope_reason:
          type: string
          enum:
          - development_asset
          - staging_asset
          - out_of_scope_production_asset
          description: Out of scope reason if the repository is not in scope.
        region:
          type: string
          description: The region this CloudResource belongs to.
        tags:
          type: array
          items:
            type: string
          description: The tags for this CloudResource.
        third_party_id:
          type: string
          description: The identifier for this CloudResource on the vendor side.
        vendor_name:
          type: string
          description: The name of the vendor that this CloudResource is from.
        updated_at:
          type: string
          format: date-time
          description: The date this CloudResource was last updated.
    Comment:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: The identifier for this test.
        commentable_id:
          type: string
          format: uuid
          description: The identifier for the commentable object.
        commentable_type:
          type: string
          enum:
          - audit_test
          - CompanyAuditTest
          - audit
          - CompanyAudit
          - control
          - CompanyControlV2
          - evidence
          - Evidence
          - framework_requirement
          - CompanyFrameworkRequirement
          - policy
          - Policy
          - risk
          - CompanyRisk
          - test
          - CompanyTest
          - vendor
          - VendorRiskDetail
          description: The type of the commentable object.
        created_at:
          type: string
          format: date-time
          description: The date when this comment was created.
        content:
          type: string
          description: The content of the comment.
        updated_at:
          type: string
          format: date-time
          description: The date when this comment was updated.
    Control:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: The identifier for this control.
        at_risk_test_count:
          type: integer
          description: The number of associated tests currently at risk of failing.
        author_name:
          type: string
          description: The name of the author if custom, Secureframe otherwise.
        created_at:
          type: string
          format: date-time
          description: The date the control was created.
        custom:
          type: boolean
          description: True if the control is custom, false if it's Secureframe-authored.
        description:
          type: string
          description: The control description.
        disabled_justification:
          type: string
          description: The reason the control was disabled if applicable.
        disabled_test_count:
          type: integer
          description: The number of associated tests that are disabled.
        enabled:
          type: boolean
          description: True if the control is currently enabled.
        failing_test_count:
          type: integer
          description: The number of associated tests currently failing.
        first_failed_at:
          type: string
          format: date-time
          description: The date the control first failed.
        framework_ids:
          type: array
          items:
            type: string
            format: uuid
          description: The IDs of the frameworks that the control is associated with.
        framework_keys:
          type: array
          items:
            type: string
          description: The keys of the frameworks that the control is associated with.
        framework_requirement_keys:
          type: array
          items:
            type: string
          description: The keys of the framework requirements that the control is
            associated with.
        health_status:
          type: string
          description: The overall health of the control.
        implementation_date:
          type: string
          format: date-time
          description: The date when the control is/was to be implemented.
        implementation_status:
          type: string
          description: The current implementation status of the control.
        key:
          type: string
          description: The user-friendly identifier used to reference this control.
        name:
          type: string
          description: The control name.
        owner_assigned_at:
          type: string
          format: date-time
          description: The date the control was assigned to its current owner.
        owner_name:
          type: string
          description: The control owner's name.
        passing_test_count:
          type: integer
          description: The number of associated tests currently passing.
        updated_at:
          type: string
          format: date-time
          description: The date when the control was last updated.
    FrameworkAssetScope:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: The identifier for this framework asset scope.
        active:
          type: boolean
          description: Flag to indicate if this asset is in scope for this framework.
        asset_id:
          type: string
          format: uuid
          description: The identifier of the asset.
        asset_type:
          type: string
          enum:
          - CloudResource
          - CompanyUser
          - CompanyUserVendor
          - Device
          - Evidence
          - ProductionBranch
          - PullRequest
          - Repository
          - Ticket
          - DataPlatform::ResourceData
          description: The type of the asset.
        created_at:
          type: string
          format: date-time
          description: The date the framework asset scope was created.
        framework_id:
          type: string
          format: uuid
          description: The identifier of the framework.
        framework_title:
          type: string
          description: The title of the framework.
        manually_scoped:
          type: boolean
          description: Flag to indicate if this asset is manually scoped.
        manually_scoped_reason:
          type: string
          description: Reason if this asset is manually scoped.
        updated_at:
          type: string
          format: date-time
          description: The date when the framework asset scope was last updated.
    FrameworkRequirement:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: The identifier for this Framework Requirement.
        company_id:
          type: string
          format: uuid
          description: The identifier for the Company.
        created_at:
          type: string
          format: date-time
          description: The date this Framework Requirement was created.
        description:
          type: string
          description: The description of the Framework Requirement.
        enabled:
          type: boolean
          description: Whether this Framework Requirement is enabled.
        health_status:
          type: string
          description: The overall health of the Framework Requirement.
        key:
          type: string
          description: The key of the Framework Requirement.
        name:
          type: string
          description: The name of the Framework Requirement.
        updated_at:
          type: string
          format: date-time
          description: The date this Framework Requirement was updated.
    Framework:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: The identifier for this Framework.
        applicable_controls_count:
          type: integer
          description: The number of applicable controls for this Framework.
        applicable_framework_requirements_count:
          type: integer
          description: The number of applicable framework requirements for this Framework.
        at_risk_test_count:
          type: integer
          description: The number of at risk tests for this Framework.
        created_at:
          type: string
          format: date-time
          description: The date this Framework was created.
        description:
          type: string
          description: The description of the Framework.
        discarded_at:
          type: string
          format: date-time
          description: The date this Framework was discarded.
        disabled_test_count:
          type: integer
          description: The number of non-applicable tests for this Framework.
        failing_test_count:
          type: integer
          description: The number of failing tests for this Framework.
        key:
          type: string
          description: The key of the Framework.
        title:
          type: string
          description: The title of the Framework.
        passing_test_count:
          type: integer
          description: The number of passing tests for this Framework.
        updated_at:
          type: string
          format: date-time
          description: The date this CompanyVendorConnection was updated.
    CompanyRisk:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: The identifier for this CompanyRisk.
        annualized_rate_of_occurrence:
          type: number
          format: float
          description: The annualized rate of occurrence for this CompanyRisk.
        asset_value:
          type: integer
          description: The asset value for this CompanyRisk.
        categories:
          type: array
          items:
            type: string
          description: The categories for this CompanyRisk.
        cia:
          type: array
          items:
            type: string
          description: The CIA for this CompanyRisk.
        departments:
          type: array
          items:
            type: string
          description: The departments for this CompanyRisk.
        description:
          type: string
          description: The description for this CompanyRisk.
        exposure_factor:
          type: number
          format: float
          description: The exposure factor for this CompanyRisk.
        impact_justification:
          type: string
          description: The impact justification for this CompanyRisk.
        likelihood_justification:
          type: string
          description: The likelihood justification for this CompanyRisk.
        notes:
          type: string
          description: The notes for this CompanyRisk.
        reference_url:
          type: string
          description: The reference URL for this CompanyRisk.
        related_tickets:
          type: string
          description: The related tickets for this CompanyRisk.
        reported_by:
          type: string
          description: The reported by for this CompanyRisk.
        residual_impact_justification:
          type: string
          description: The residual impact justification for this CompanyRisk.
        residual_likelihood_justification:
          type: string
          description: The residual likelihood justification for this CompanyRisk.
        responsible_team:
          type: string
          description: The responsible team for this CompanyRisk.
        source:
          type: string
          description: The source for this CompanyRisk.
        status:
          type: string
          description: The status for this CompanyRisk.
        treatment:
          type: string
          description: The treatment for this CompanyRisk.
        treatment_decision_notes:
          type: string
          description: The treatment decision notes for this CompanyRisk.
        uncertainty:
          type: number
          format: float
          description: The uncertainty for this CompanyRisk.
        created_at:
          type: string
          format: date-time
          description: The date this CompanyRisk was created.
        updated_at:
          type: string
          format: date-time
          description: The date this CompanyRisk was updated.
        company_id:
          type: string
          format: uuid
          description: The identifier for the company for this CompanyRisk.
        owner_id:
          type: string
          format: uuid
          description: The identifier for the owner for this CompanyRisk.
        custom_risk_id:
          type: string
          description: The custom risk ID for this CompanyRisk.
    Test:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: The identifier for this test.
        created_at:
          type: string
          format: date-time
          description: The date when this test was created.
        custom:
          type: boolean
          description: True if the test is custom (user generated), false if it's
            Secureframe-authored.
        description:
          type: string
          description: The description for the test.
        detailed_remediation_steps:
          type: string
          description: Guidance for remediating this test in the event it fails.
        disabled_justification:
          type: string
          description: Reason for disabling the test.
        enabled:
          type: boolean
          description: True if the test is currently enabled.
        enabled_field_updated_by_user_name:
          type: string
          description: The name of the user who enabled the test, null if wasn't enabled
            by a user.
        failure_message:
          type: string
          description: The message to be displayed if the test fails.
        first_failed_at:
          type: string
          format: date-time
          description: The date the test first failed.
        framework_ids:
          type: array
          items:
            type: string
            format: uuid
          description: The IDs of the frameworks that the test is associated with.
        framework_keys:
          type: array
          items:
            type: string
          description: The keys of the frameworks that the test is associated with.
        health_status:
          type: string
          description: The overall health of the test.
        key:
          type: string
          description: The user-friendly identifier used to reference this test.
        last_evaluated:
          type: string
          format: date-time
          description: The date the test was last evaluated at.
        last_passed_at:
          type: string
          format: date-time
          description: The date the test last had a passing evaluation.
        next_due_date:
          type: string
          format: date-time
          description: The date new test evidence is needed by if applicable.
        owner_assigned_at:
          type: string
          format: date-time
          description: The date the test owner was assigned.
        owner_name:
          type: string
          description: The test owner's name.
        pass:
          type: boolean
          description: True if the test is passing, false otherwise.
        passed_with_upload:
          type: boolean
          description: True if the test passed from the existance of an upload, false
            otherwise.
        passed_with_upload_justification:
          type: string
          description: The justification used on evidence upload to pass the test
            if applicable.
        promote_at:
          type: string
          format: date-time
          description: The current date set for implementation of the test.
        promoted_by_name:
          type: string
          description: The name of the user who set the implementation date.
        recommended_action:
          type: string
          description: Actions for completing the test.
        required_implementation_date:
          type: string
          format: date-time
          description: The pre-configured date the test must be implemented by.
        resource_category:
          type: string
          description: The category the test resource belongs to.
        test_domain:
          type: string
          description: The domain the test belongs to.
        test_function:
          type: string
          description: The purpose of the test.
        test_interval_seconds:
          type: integer
          description: The interval in which test evidence should be collected if
            applicable.
        test_type:
          type: string
          enum:
          - upload
          - integration
          - platform
          description: The type of test.
        title:
          type: string
          description: The test title.
        tolerance_window_seconds:
          type: integer
          description: The time between the test interval elapsing and evidence becoming
            stale and test failing if applicable.
        updated_at:
          type: string
          format: date-time
          description: The date the test was last updated.
        vendor_name:
          type: string
          description: The vendor name associated with the test if applicable.
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: The identifier for this user.
        access_role:
          type: string
          description: The user's access role in the system.
        active:
          type: boolean
          description: True if the user's account is active, false if it has been
            deactivated.
        active_source:
          type: string
          description: The integration the active status was sourced from.
        created_at:
          type: string
          format: date-time
          description: The date when this user account was created.
        department_id:
          type: string
          description: The identifier of the department the user belongs to.
        email:
          type: string
          description: The user's email.
        employee_type:
          type: string
          enum:
          - contractor
          - employee
          - non_employee
          - auditor
          - external
          - workspace
          description: The type of employee (contractor, employee, non-employee etc).
        end_date:
          type: string
          format: date-time
          description: The date of the user's termination if applicable.
        first_name:
          type: string
          description: The user's first name.
        image_url:
          type: string
          description: The user's icon image URL.
        in_audit_scope:
          type: boolean
          description: True if this user is in scope for being audited, false if they
            are exempt.
        invited:
          type: boolean
          description: True if an invitation to Secureframe has been sent to the user's
            email, false otherwise.
        invited_at:
          type: string
          format: date-time
          description: The date the user was invited.
        last_name:
          type: string
          description: The user's last name.
        manager_name:
          type: string
          description: The name of the user's manager if applicable, null otherwise.
        middle_name:
          type: string
          description: The user's middle name.
        name:
          type: string
          description: The first and last name of the user separated by a space.
        onboarding_status:
          type: string
          description: The current onboarding status of the user.
        personnel_status:
          type: string
          description: The current personnel status of the user.
        preferred_first_name:
          type: string
          description: The user's preferred first name if applicable, null otherwise.
        role:
          type: string
          description: The user's role at the company.
        secureframe_agent_acknowledged_at:
          type: string
          format: date-time
          description: The date the user completed installation of the Secureframe
            device agent.
        start_date:
          type: string
          format: date-time
          description: The date the user started employment at the company.
        title:
          type: string
          description: The user's job title.
        updated_at:
          type: string
          format: date-time
          description: The date this user account was last updated.
    UserAccount:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: The identifier for this UserAccount.
        active:
          type: boolean
          description: Flag to indicate if this is an active user account on the vendor
            side. Defaults to true if the vendor does not support or provide this
            value.
        created_at:
          type: string
          format: date-time
          description: The date this UserAccount was created.
        email:
          type: string
          description: The email received from the connection.
        first_name:
          type: string
          description: The first name of the user received from the connection.
        has_user:
          type: boolean
          description: Flag to indicate if this UserAccount has a User. False indicates
            that it's an unlinked account.
        last_name:
          type: string
          description: The last name of the user received from the connection.
        third_party_id:
          type: string
          description: The identifier for this UserAccount on the vendor side.
        username:
          type: string
          description: The user name of the UserAccount on the vendor side.
        vendor_name:
          type: string
          description: The name of the vendor that this UserAccount is from.
        updated_at:
          type: string
          format: date-time
          description: The date this UserAccount was last updated.
    IntegrationConnection:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: The identifier for this IntegrationConnection.
        name:
          type: string
          description: The name of the IntegrationConnection if applicable.
        status:
          type: string
          enum:
          - connected
          - disabled
          - not_connected
          - pending
          description: The status of the IntegrationConnection.
        vendor_name:
          type: string
          description: The name of the vendor for this IntegrationConnection.
        updated_at:
          type: string
          format: date-time
          description: The date this IntegrationConnection was last updated.
    Vendor:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: The identifier for this Vendor.
        archived:
          type: boolean
          description: Flag to indicate if this Vendor is archived.
        archived_at:
          type: string
          format: date-time
          description: The date this Vendor was archived (if it is archived).
        archived_by:
          type: string
          format: uuid
          description: The identifier of the User that archived this Vendor (if it
            is archived).
        audit_scopes:
          type: array
          items:
            type: string
          description: The audit scopes for this Vendor.
        authentication_type:
          type: string
          enum:
          - password
          - single_sign_on
          description: The authentication type for this Vendor.
        data_collected:
          type: string
          description: The data collected for this Vendor.
        date_of_engagement:
          type: string
          format: date-time
          description: The date of engagement for this Vendor.
        domain:
          type: string
          description: The domain of the Vendor.
        environment_types:
          type: array
          items:
            type: string
            enum:
            - production
            - development
          description: The environment types for this Vendor.
        last_reviewed_at:
          type: string
          format: date-time
          description: The date this Vendor was last reviewed.
        name:
          type: string
          description: The name of the Vendor.
        operational_reliance:
          type: string
          description: The operational reliance for this Vendor.
        other_information:
          type: string
          description: Other information for this Vendor.
        owner_id:
          type: string
          format: uuid
          description: The identifier of the User that is the owner for this Vendor.
        risk_level:
          type: string
          enum:
          - high
          - medium
          - low
          description: The risk level for this Vendor.
        security_url:
          type: string
          description: The security URL for this Vendor.
        services:
          type: string
          description: The services provided by this Vendor.
        terminated_at:
          type: string
          format: date-time
          description: The date this Vendor was terminated (if it is archived).
        third_party_audit_report_concerns:
          type: string
          description: The third party audit report concerns for this Vendor.
        two_factor_enabled:
          type: boolean
          description: Flag to indicate if two factor is enabled for this Vendor.
        updated_at:
          type: string
          format: date-time
          description: The date this Vendor was last updated.
    Device:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: The identifier for this Device.
        created_at:
          type: string
          format: date-time
          description: The date this Device object was created.
        cpu:
          type: string
          description: The cpu info available for this Device.
        device_name:
          type: string
          description: The name of the Device.
        hard_drive_encrypted:
          type: boolean
          description: Flag to indicate if the hard drive is encrypted.
        in_audit_scope:
          type: boolean
          description: Flag to indicate if this Device is in scope.
        last_checkin_at:
          type: string
          format: date-time
          description: The date this Device last checked in.
        local_firewall_enabled:
          type: boolean
          description: Flag to indicate if the local firewall is enabled.
        mac_address:
          type: string
          description: The MAC address of the Device.
        make:
          type: string
          description: The make of the Device.
        memory:
          type: string
          description: The memory of the Device.
        model:
          type: string
          description: The model of the Device.
        native_anti_virus_enabled:
          type: boolean
          description: Flag to indicate if the native antivirus is enabled.
        os:
          type: string
          description: The operating system of the Device.
        out_of_audit_scope_reason:
          type: string
          enum:
          - development_asset
          - staging_asset
          - out_of_scope_production_asset
          description: Out of scope reason if the Device is not in scope.
        password_enforcement_enabled:
          type: boolean
          description: Flag to indicate if password enforcement is enabled.
        remote_ip:
          type: string
          description: The remote IP of the Device.
        serial_number:
          type: string
          description: The serial number of the Device.
        session_timeout_enabled:
          type: boolean
          description: Flag to indicate if session timeout is enabled.
        updated_at:
          type: string
          format: date-time
          description: The date this Device was last updated.
    Evidence:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: The identifier for this Evidence.
        activity_completion:
          type: string
          format: date
          description: The date the activity was completed
        created_at:
          type: string
          format: date-time
          description: The date this Evidence was created.
        updated_at:
          type: string
          format: date-time
          description: The date this Evidence was updated.
    KnowledgeBaseAnswer:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: The identifier for this knowledge base answer.
        content:
          type: string
          description: The content of the knowledge base answer.
        created_at:
          type: string
          format: date-time
          description: The date this knowledge base answer was created.
        primary_answer:
          type: boolean
          description: Flag to indicate if this is the primary answer.
        type:
          type: string
          enum:
          - KnowledgeBaseAnswerFreeForm
          - KnowledgeBaseAnswerYesOrNo
          - KnowledgeBaseAnswerTrueOrFalse
          description: The type of the knowledge base answer.
